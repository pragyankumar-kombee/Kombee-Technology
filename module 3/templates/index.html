<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDB Sentiment Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 IMDB Movie Review Sentiment Analysis</h1>
            <p class="subtitle">Powered by DistilBERT</p>
        </header>

        <main>
            <div class="input-section">
                <label for="review">Enter your movie review:</label>
                <textarea id="review" placeholder="Type or paste your movie review here..."></textarea>
                <button id="analyzeBtn" onclick="analyzeSentiment()">Analyze Sentiment</button>
            </div>

            <div id="result" class="result hidden">
                <h2>Analysis Result</h2>
                <div class="sentiment-badge" id="sentimentBadge"></div>
                <div class="confidence-bar">
                    <div class="confidence-label">Confidence:</div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="confidenceText" class="confidence-text"></div>
                </div>
            </div>

            <div class="examples">
                <h3>Try these examples:</h3>
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExample(0)">Positive Review</button>
                    <button class="example-btn" onclick="setExample(1)">Negative Review</button>
                    <button class="example-btn" onclick="setExample(2)">Mixed Review</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Built with Flask & DistilBERT</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
