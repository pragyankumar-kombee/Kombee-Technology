<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ domain | title }} AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo">
                <i class='bx bx-brain'></i>
                <span>Nexus AI</span>
            </div>
            <div class="domain-badge">
                <i class='bx bx-briefcase-alt-2'></i>
                <span>{{ domain | title }} Domain</span>
            </div>
            <div class="sidebar-menu">
                <button id="clearBtn" class="menu-btn">
                    <i class='bx bx-trash'></i>
                    <span>Clear Conversation</span>
                </button>
                <button id="actionsBtn" class="menu-btn">
                    <i class='bx bx-list-ul'></i>
                    <span>Actions & Sections</span>
                </button>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <h2>{{ domain | title }} Assistant</h2>
                <div class="status">
                    <span class="status-dot"></span>
                    <span id="modelStatus">Ready</span>
                </div>
            </div>
            
            <div id="chatBox" class="chat-box">
                <!-- Messages will appear here -->
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="Ask something about {{ domain }}..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <i class='bx bx-send'></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Action Panel -->
        <div id="actionPanel" class="action-panel">
            <div class="panel-header">
                <h3><i class='bx bx-list-ul'></i> Actions & Sections</h3>
                <button id="closePanelBtn" class="close-btn">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <div class="panel-content">
                <div class="sections-list" id="sectionsList">
                    <!-- Sections will be loaded here -->
                </div>
                <button id="addSectionBtn" class="add-section-btn">
                    <i class='bx bx-plus'></i>
                    <span>Add New Section</span>
                </button>
            </div>
        </div>
    </div>
    
    <script src="/static/js/script.js?v=3"></script>
</body>
</html>
